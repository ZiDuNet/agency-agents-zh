name: Package & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 读取版本号
        id: version
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          echo "pkg_version=${PKG_VER}" >> $GITHUB_OUTPUT
          echo "tag=v${PKG_VER}-build$(date +%Y%m%d%H%M)" >> $GITHUB_OUTPUT

      - name: Pack
        run: zip -r release.zip . -x ".git/*" ".github/*" "scripts/*"

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: release.zip
          body: |
            版本: ${{ steps.version.outputs.pkg_version }}
            commit: ${{ github.sha }}
