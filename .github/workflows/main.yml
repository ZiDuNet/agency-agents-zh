# agency-agents-zh 自动打包发布
# 无需编译，直接打包 markdown 文件
name: Package & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 读取版本号
        id: version
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=v${PKG_VER}-build$(date +%Y%m%d%H%M)" >> $GITHUB_OUTPUT
          fi
          echo "pkg_version=${PKG_VER}" >> $GITHUB_OUTPUT

      - name: 打包
        run: |
          # 全量打包，排除不需要的目录
          tar -czf agency-agents-zh-dist.tar.gz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='scripts' \
            --exclude='node_modules' \
            .

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          files: agency-agents-zh-dist.tar.gz
          body: |
            版本: ${{ steps.version.outputs.pkg_version }}
            commit: ${{ github.sha }}
