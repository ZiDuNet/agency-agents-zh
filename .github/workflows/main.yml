name: Package & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 生成版本（用时间戳，永不报错）
      - name: Generate version
        id: version
        run: echo "tag=v$(date +%Y%m%d%H%M)" >> $GITHUB_OUTPUT

      # 打包（最简单写法，100%成功）
      - name: Pack
        run: zip -r release.zip . -x ".git/*" ".github/*" "scripts/*"

      # 发布
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: release.zip
